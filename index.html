<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipovačka MS 2026</title>
<style>
:root{--bg:#0b1220;--card:#141c2f;--border:#1e293b;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--gold:#fbbf24;--green:#22c55e;--red:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}.app{max-width:560px;margin:0 auto;padding:20px 14px 80px}header h1{font-size:28px;margin:0;display:flex;align-items:center;gap:10px;font-weight:800}.subtitle{color:var(--muted);font-size:14px;margin:6px 0 0 38px}.meta{display:flex;justify-content:space-between;align-items:center;margin:20px 2px 18px;color:var(--muted);font-size:13px}.btn-refresh{background:#1a2438;border:1px solid #263246;color:#d1d5db;padding:6px 12px;border-radius:999px;font-size:13px;cursor:pointer}.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.sum-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 14px 12px}.sum-card.label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}.sum-card.value{font-size:30px;font-weight:800;line-height:1}.sum-card.sub{font-size:12px;color:var(--muted);margin-top:6px}.sum-card.leader.value{color:var(--gold)}.tabs{display:flex;gap:8px;margin:0 0 14px;overflow-x:auto;padding-bottom:2px}.tab-btn{background:#141d31;border:1px solid var(--border);color:#cbd5e1;padding:9px 14px;border-radius:999px;font-size:14px;white-space:nowrap;cursor:pointer}.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}.tab-content{display:none}.tab-content.active{display:block}.player-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}.player-card.gold{border-color:rgba(251,191,36,.55);box-shadow:0 0 0 1px rgba(251,191,36,.25) inset}.player-card.inactive{opacity:.45}.rank-badge{width:36px;height:36px;border-radius:12px;background:#1f2937;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}.rank-badge.gold{background:linear-gradient(180deg,#fde68a,#f59e0b);color:#111}.player-main{flex:1;min-width:0}.player-name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.player-sub{font-size:12px;color:var(--muted);margin-top:2px}.player-points{text-align:right}.player-points.pts{font-size:24px;font-weight:800;line-height:1}.player-points.pts.gold{color:var(--gold)}.player-points.sub{font-size:11px;color:var(--muted);margin-top:4px}.dot{width:8px;height:8px;border-radius:50%;background:#334155;display:inline-block}.dot.hit{background:var(--green)}.dot.miss{background:var(--red)}
</style>
</head>
<body>
<div class="app">
<header><h1>🏆 Tipovačka MS 2026</h1><div class="subtitle">Žebříček a statistiky naší tipovačky</div><div class="meta"><div>Načteno: <span id="loaded">14:21</span> · odehráno <span id="played">36/72</span></div><button class="btn-refresh" id="refresh">⟳ Obnovit</button></div></header>
<div class="summary-grid">
<div class="sum-card leader"><div class="label">🥇 VEDOUCÍ</div><div class="value" id="leaderName">Štěpán</div><div class="sub" id="leaderPts">23 bodů</div></div>
<div class="sum-card"><div class="label">ÚSPĚŠNOST VEDOUCÍHO</div><div class="value" id="leaderPct">64%</div><div class="sub" id="leaderHits">23/36</div></div>
<div class="sum-card"><div class="label">ODEHRÁNO</div><div class="value" id="playedBig">36/72</div><div class="sub">zápasů</div></div>
<div class="sum-card"><div class="label">NÁSKOK V ČELE</div><div class="value" id="leadGap">+2</div><div class="sub">bodů</div></div>
</div>
<div class="tabs"><button class="tab-btn active" data-tab="zebricek">🥇 Žebříček</button><button class="tab-btn" data-tab="zapasy">⚽ Zápasy</button><button class="tab-btn" data-tab="tipy">📋 Všechny tipy</button><button class="tab-btn" data-tab="statistiky">📊 Statistiky</button></div>
<section id="zebricek" class="tab-content active"><div id="players-list"></div></section>
<section id="zapasy" class="tab-content"><div id="matches-list"></div></section>
<section id="tipy" class="tab-content"><div id="tips-list"></div></section>
<section id="statistiky" class="tab-content"><div style="color:var(--muted);text-align:center;padding:40px 0">Statistiky se načtou ze Sheetu</div></section>
</div>
<script>
// --- TVŮJ PŮVODNÍ KÓD ---
const playersData=[{name:"Štěpán",pts:23,hits:23},{name:"Andy",pts:21,hits:21},{name:"Brácha",pts:20,hits:20},{name:"Hejk",pts:19,hits:19},{name:"Míňa",pts:18,hits:18},{name:"Kulča",pts:17,hits:17},{name:"Vosa",pts:16,hits:16},{name:"Příba",pts:15,hits:15},{name:"Janča",pts:14,hits:14},{name:"Bochy",pts:13,hits:13},{name:"Árči",pts:12,hits:12},{name:"Vráťa",pts:11,hits:11},{name:"Šimon",pts:10,hits:10},{name:"Žofka",pts:0,hits:0,inactive:true},{name:"Smůťa",pts:0,hits:0,inactive:true},{name:"Míša",pts:0,hits:0,inactive:true},{name:"Vojta",pts:0,hits:0,inactive:true},{name:"Kamča",pts:0,hits:0,inactive:true}];
function render(){document.getElementById('players-list').innerHTML=playersData.map((p,i)=>`<div class="player-card ${i===0?'gold':''} ${p.inactive?'inactive':''}"><div class="rank-badge ${i===0?'gold':''}">${i+1}</div><div class="player-main"><div class="player-name">${p.name}</div><div class="player-sub">${p.hits} tref / ${p.inactive?'neaktivní':'aktivní'}</div></div><div class="player-points"><div class="pts ${i===0?'gold':''}">${p.pts}</div><div class="sub">${Math.round(p.hits/36*100)}%</div></div></div>`).join('');}
render();
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.getElementById(b.dataset.tab).classList.add('active');});

// --- NOVÉ: ŽIVÉ NAPOJENÍ NA SHEET (jen přepíše čísla, design nechá) ---
const SHEET_ID='18QEkbZinvAT0fXvsDvJwGba1jEAuH5PAkAdrh3S6k6g';
const INACTIVE=['Žofka','Smůťa','Míša','Vojta','Kamča'];
async function loadLive(){
 try{
  const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
  const txt=await res.text();
  const json=JSON.parse(txt.substr(47).slice(0,-2));
  const rows=json.table.rows;
  let played=0;
  // spočítej odehrané
  for(let r=1;r<rows.length;r++){if(rows[r].c[23]?.v) played++;}
  // přepiš body
  playersData.forEach(p=>{
    if(INACTIVE.includes(p.name)){p.inactive=true;return;}
    const col=rows[0].c.findIndex(c=>c&&c.v===p.name);
    if(col<0) return;
    let pts=0,hits=0;
    for(let r=1;r<rows.length;r++){const tip=rows[r].c[col]?.v;const real=rows[r].c[23]?.v;if(real && tip===real){pts++;hits++;}}
    p.pts=pts;p.hits=hits;p.inactive=false;
  });
  playersData.sort((a,b)=>(b.inactive? -1:0)-(a.inactive? -1:0) || b.pts-a.pts);
  // update hlavička
  document.getElementById('leaderName').textContent=playersData[0].name;
  document.getElementById('leaderPts').textContent=playersData[0].pts+' bodů';
  document.getElementById('leaderPct').textContent=Math.round(playersData[0].hits/played*100)+'%';
  document.getElementById('leaderHits').textContent=playersData[0].hits+'/'+played;
  document.getElementById('played').textContent=played+'/78';
  document.getElementById('playedBig').textContent=played+'/78';
  document.getElementById('leadGap').textContent='+'+(playersData[0].pts-playersData[1].pts);
  document.getElementById('loaded').textContent=new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  render();
 }catch(e){console.log('Sheet offline, zůstává demo');}
}
document.getElementById('refresh').onclick=loadLive;
loadLive();
</script>
