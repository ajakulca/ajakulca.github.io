<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tipovačka MS 2026</title>
<style>
:root{--bg:#0b1220;--card:#141c2f;--border:#1e293b;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--gold:#fbbf24;--green:#22c55e;--green-bg:#052e16;--green-border:#14532d;--red:#ef4444}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
.app{max-width:560px;margin:0 auto;padding:20px 14px}
h1{font-size:28px;margin:0;display:flex;gap:10px;font-weight:800}
.subtitle{color:var(--muted);font-size:14px;margin:6px 0 0 38px}
.meta{display:flex;justify-content:space-between;margin:20px 2px;color:var(--muted);font-size:13px}
.btn-refresh{background:#1a2438;border:1px solid #263246;color:#d1d5db;padding:6px 12px;border-radius:999px;font-size:13px;cursor:pointer}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px}
.sum-card .label{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.sum-card .value{font-size:30px;font-weight:800}
.sum-card.leader .value{color:var(--gold)}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab-btn{background:#141d31;border:1px solid var(--border);color:#cbd5e1;padding:9px 14px;border-radius:999px;font-size:14px;cursor:pointer}
.tab-btn.active{background:var(--blue);color:#fff}
.tab-content{display:none}.tab-content.active{display:block}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.player-card.gold{border-color:rgba(251,191,36,.55);box-shadow:0 0 0 1px rgba(251,191,36,.25)}
.player-name{font-weight:700;font-size:16px}
.player-points{text-align:right;margin-left:auto}
.player-points .pts{font-size:24px;font-weight:800}
.player-card.gold .pts{color:var(--gold)}
</style>
</head>
<body>
<div class="app">
<header>
<h1>🏆 Tipovačka MS 2026</h1>
<div class="subtitle">Žebříček a statistiky naší tipovačky</div>
<div class="meta"><div>Načteno: <span id="loaded">--:--</span> · odehráno <span id="played">0/78</span></div><button class="btn-refresh" id="refresh">⟳ Obnovit</button></div>
</header>
<div class="summary-grid">
<div class="sum-card leader"><div class="label">🥇 VEDOUCÍ</div><div class="value" id="leaderName">—</div><div class="sub" id="leaderPts">0 bodů</div></div>
<div class="sum-card"><div class="label">ÚSPĚŠNOST VEDOUCÍHO</div><div class="value" id="leaderPct">0%</div><div class="sub" id="leaderHits">0/0</div></div>
<div class="sum-card"><div class="label">ODEHRÁNO</div><div class="value" id="playedBig">0/78</div><div class="sub">zápasů</div></div>
<div class="sum-card"><div class="label">NÁSKOK V ČELE</div><div class="value" id="leadGap">+0</div><div class="sub">bodů</div></div>
</div>
<div class="tabs"><button class="tab-btn active" data-tab="zebricek">🥇 Žebříček</button><button class="tab-btn" data-tab="zapasy">⚽ Zápasy</button></div>
<section id="zebricek" class="tab-content active"><div id="players"></div></section>
<section id="zapasy" class="tab-content"><div id="matches"></div></section>
</div>
<script>
const SHEET_ID='18QEkbZinvAT0fXvsDvJwGba1jEAuH5PAkAdrh3S6k6g';
const SHEET_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
async function load(){
const res=await fetch(SHEET_URL);const txt=await res.text();const json=JSON.parse(txt.substr(47).slice(0,-2));
const rows=json.table.rows;const players=[];
for(let c=2;c<=19;c++){const name=rows[0].c[c]?.v;if(name&&!['Žofka','Smůťa','Míša','Vojta','Kamča'].includes(name))players.push({name,col:c,pts:0,hits:0});}
let played=0;const matches=[];
for(let r=1;r<rows.length;r++){const score=rows[r].c[23]?.v;if(score){played++;matches.push({id:r,home:rows[r].c[0]?.v,away:rows[r].c[1]?.v,score});players.forEach(p=>{const tip=rows[r].c[p.col]?.v;if(tip&&tip===score){p.pts++;p.hits++;}});}}
players.sort((a,b)=>b.pts-a.pts);
document.getElementById('leaderName').textContent=players[0].name;
document.getElementById('leaderPts').textContent=players[0].pts+' bodů';
document.getElementById('leaderPct').textContent=Math.round(players[0].hits/played*100)+'%';
document.getElementById('leaderHits').textContent=players[0].hits+'/'+played;
document.getElementById('played').textContent=played+'/78';
document.getElementById('playedBig').textContent=played+'/78';
document.getElementById('leadGap').textContent='+'+(players[0].pts-players[1].pts);
document.getElementById('loaded').textContent=new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
document.getElementById('players').innerHTML=players.map((p,i)=>`<div class="player-card ${i===0?'gold':''}"><div class="player-name">${i+1}. ${p.name}</div><div class="player-points"><div class="pts">${p.pts}</div><div>${p.hits}/${played}</div></div></div>`).join('');
document.getElementById('matches').innerHTML=matches.slice(0,36).map(m=>`<div class="player-card"><div>${m.home} – ${m.away}</div><div class="player-points"><div class="pts">${m.score}</div></div></div>`).join('');
}
document.getElementById('refresh').onclick=load;
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.getElementById(b.dataset.tab).classList.add('active');});
load();
</script>
</body></html>
