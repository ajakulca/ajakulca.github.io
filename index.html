<!DOCTYPE html>
<html lang="cs">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tipovačka MS 2026 v2.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>body{font-family:Inter}</style></head>
<body class="bg-[#0f172a] text-slate-100">
<div class="max-w-3xl mx-auto p-4">
<h1 class="text-2xl font-bold mb-1">🏆 Tipovačka MS 2026</h1>
<div class="flex gap-2 mb-4"><button id="tab1" class="px-3 py-1 bg-blue-600 rounded">Žebříček</button><button id="tab2" class="px-3 py-1 bg-slate-700 rounded">Zápasy</button></div>
<div id="view1"><div id="board" class="space-y-2"></div><button id="addP" class="mt-3 w-full bg-slate-800 py-2 rounded">+ Přidat hráče</button></div>
<div id="view2" class="hidden"><div id="matches" class="space-y-4"></div></div>
</div>
<script>
const KEY='ms26fix';
let S=JSON.parse(localStorage.getItem(KEY))||{
 players:[{id:1,n:"Ajakulca",t:"Česko"},{id:2,n:"Johny",t:"Španělsko"},{id:3,n:"Olča",t:"Brazílie"}],
 matches:[
  {id:1,h:"Nizozemsko",a:"Švédsko",d:"2026-06-20",hs:5,as:1,tips:{1:"1",2:"2",3:"X"}},
  {id:2,h:"Německo",a:"Pobřeží slonoviny",d:"2026-06-20",hs:2,as:1,tips:{}},
  {id:3,h:"Ekvádor",a:"Curaçao",d:"2026-06-21",hs:0,as:0,tips:{1:"1",2:"1",3:"1"}},
  {id:4,h:"Tunisko",a:"Japonsko",d:"2026-06-21",hs:0,as:4,tips:{}},
  {id:5,h:"Španělsko",a:"Saúdská Arábie",d:"2026-06-21",hs:null,as:null,tips:{}},
 ]
};
function res(h,a){return h>a?'1':h<a?'2':'X'}
function calc(){S.players.forEach(p=>{p.b=0;p.h=0});S.matches.forEach(m=>{if(m.hs==null)return;const r=res(m.hs,m.as);S.players.forEach(p=>{const t=(m.tips[p.id]||'').toUpperCase();if(t===r){p.b++;p.h++}})});}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function render(){
 calc();
 document.getElementById('board').innerHTML=S.players.sort((a,b)=>b.b-a.b).map((p,i)=>`<div class="bg-slate-800 p-3 rounded flex justify-between"><span>${i+1}. ${p.n} 👑${p.t}</span><b>${p.b} b.</b></div>`).join('');
 document.getElementById('matches').innerHTML=S.matches.map(m=>`<div class="bg-slate-800 p-3 rounded"><div class="font-medium">${m.h} – ${m.a} <span class="text-xs text-slate-400">${m.d}</span></div><div class="grid grid-cols-3 gap-2 mt-2">${S.players.map(p=>`<div><div class="text-xs">${p.n}</div><input data-m="${m.id}" data-p="${p.id}" value="${m.tips[p.id]||''}" class="w-full bg-slate-900 p-1 rounded text-center" placeholder="1/X/2"></div>`).join('')}</div><div class="mt-2 flex gap-2 items-center"><input type="number" data-hs="${m.id}" value="${m.hs??''}" class="w-12 bg-slate-900 p-1 rounded text-center" placeholder="0">:<input type="number" data-as="${m.id}" value="${m.as??''}" class="w-12 bg-slate-900 p-1 rounded text-center" placeholder="0"><button data-s="${m.id}" class="ml-auto bg-blue-600 px-3 py-1 rounded text-sm">Uložit</button></div></div>`).join('');
 document.querySelectorAll('input[data-m]').forEach(i=>i.onchange=e=>{const m=S.matches.find(x=>x.id==+i.dataset.m);m.tips[i.dataset.p]=i.value;save();render()});
 document.querySelectorAll('button[data-s]').forEach(b=>b.onclick=()=>{const id=+b.dataset.s;const m=S.matches.find(x=>x.id===id);m.hs=+document.querySelector(`input[data-hs="${id}"]`).value; m.as=+document.querySelector(`input[data-as="${id}"]`).value; save(); render()});
}
document.getElementById('tab1').onclick=()=>{view1.classList.remove('hidden');view2.classList.add('hidden')};
document.getElementById('tab2').onclick=()=>{view2.classList.remove('hidden');view1.classList.add('hidden')};
document.getElementById('addP').onclick=()=>{const n=prompt('Jméno:');if(n){S.players.push({id:Date.now(),n,t:prompt('Tým:')||''});save();render()}};
render();
</script></body></html>
